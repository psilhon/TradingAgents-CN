# .pre-commit-config.yaml
# Local hooks — must mirror .github/workflows/ci.yml command set
# Generated by init-ci skill (recipe: B-full-dev)
#
# ⚠️ WARN-ONLY MODE（临时，TradingAgents-CN 上游接手时启用）
# 所有 hook 用 bash wrapper 强制 exit 0；commit / push 永不被 hook 阻塞，
# 但 warning 会输出到终端。要切回阻塞模式：把每个 entry 的
# `bash -c '... || echo "[warn] ..."' --` 改回原始命令（见 git log）。

repos:
  - repo: local
    hooks:
      # pre-commit: fast checks (< 5s)
      - id: ruff-check
        name: ruff check (warn-only)
        entry: bash -c 'uv run ruff check "$@" || echo "[warn-only] ruff check found issues — fix later"' --
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format check (warn-only)
        entry: bash -c 'uv run ruff format --check "$@" || echo "[warn-only] ruff format would change files — run `just fix`"' --
        language: system
        types: [python]

      - id: pyright
        name: pyright (warn-only)
        entry: bash -c 'uv run pyright || echo "[warn-only] pyright found type issues — fix later"'
        language: system
        types: [python]
        pass_filenames: false

      # pre-push: full test suite (slow, but warn-only too during initial setup)
      - id: pytest
        name: pytest (warn-only)
        entry: bash -c 'uv run pytest || echo "[warn-only] pytest had failures — investigate"'
        language: system
        pass_filenames: false
        stages: [pre-push]

ci:
  autofix_prs: true
  autoupdate_schedule: weekly
