# .pre-commit-config.yaml
# Local hooks — must mirror .github/workflows/ci.yml command set
# Generated by init-ci skill (recipe: B-full-dev), customized for TradingAgents-CN fork.
#
# 📊 分阶段严格模式（OpenSpec changes 沉淀）：
# - ruff (lint + format): **STRICT** —— 引入新 issue 立即阻塞 commit (ruff-strict-mode-enable)
# - pyright (typecheck): **STRICT** —— pyright 0 errors (pyright-handfix-pass-2)
# - pytest (test): WARN-ONLY —— 大量 test 需 .env / 网络（待 pytest-marker-strict change）
#
# 后续 pytest 设计 marker 体系后独立转严格。
#
# ⚠️ 工具调用：lint 用 `uvx`（从 pypi 拉，与 justfile 同源），
# pytest 用 `uv run --no-sync`（pytest 在 .venv）。

repos:
  - repo: local
    hooks:
      # pre-commit: fast checks (< 5s) — STRICT (block on issue)
      - id: ruff-check
        name: ruff check
        entry: uvx ruff check
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format check
        entry: uvx ruff format --check
        language: system
        types: [python]

      # pre-commit: typecheck — STRICT (pyright 0 errors)
      - id: pyright
        name: pyright
        entry: uvx pyright
        language: system
        types: [python]
        pass_filenames: false

      # pre-push: full test suite — WARN-ONLY (pytest 未装 + 需 env/网络)
      - id: pytest
        name: pytest (warn-only)
        entry: bash -c 'uv run --no-sync pytest || echo "[warn-only] pytest unavailable / failed — see pytest-baseline OpenSpec change"'
        language: system
        pass_filenames: false
        stages: [pre-push]

ci:
  autofix_prs: true
  autoupdate_schedule: weekly
