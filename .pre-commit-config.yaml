# .pre-commit-config.yaml
# Local hooks — must mirror .github/workflows/ci.yml command set
# Generated by init-ci skill (recipe: B-full-dev), customized for TradingAgents-CN fork.
#
# 📊 严格模式（全部 OpenSpec changes 沉淀完成）：
# - ruff (lint + format): **STRICT** —— ruff-strict-mode-enable
# - pyright (typecheck): **STRICT** —— pyright-handfix-pass-2
# - pytest (test): **STRICT (-m unit)** —— pytest-marker-strict
#   只跑 @pytest.mark.unit 标记的 test（默认 0 个，未标 marker auto-mark requires_env）。
#   后续逐步给真正 unit test 加 marker 扩展严格 cov。
#
# ⚠️ 工具调用：lint 用 `uvx`（从 pypi 拉，与 justfile 同源），
# pytest 用 `uv run --no-sync`（pytest 在 .venv）。

repos:
  - repo: local
    hooks:
      # pre-commit: fast checks (< 5s) — STRICT (block on issue)
      - id: ruff-check
        name: ruff check
        entry: uvx ruff check
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format check
        entry: uvx ruff format --check
        language: system
        types: [python]

      # pre-commit: typecheck — STRICT (pyright 0 errors)
      - id: pyright
        name: pyright
        entry: uvx pyright
        language: system
        types: [python]
        pass_filenames: false

      # pre-push: unit tests only — STRICT
      # 默认所有未标 marker 的 test auto-mark requires_env（不在此跑），
      # 只有显式 @pytest.mark.unit 的 test 才在 pre-push 跑。
      # exit 5 = "no tests collected"（unit marker 0 时合法）—— bash wrapper 处理。
      - id: pytest
        name: pytest -m unit
        entry: bash -c 'uv run --no-sync pytest -m unit -p no:cacheprovider --no-header; status=$?; [ $status -eq 0 ] || [ $status -eq 5 ]'
        language: system
        pass_filenames: false
        stages: [pre-push]

ci:
  autofix_prs: true
  autoupdate_schedule: weekly
