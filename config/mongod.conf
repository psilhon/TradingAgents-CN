# MongoDB 配置文件 — TradingAgents-CN 本地部署模式
# 由 scripts/local-services.sh 加载，绝不被 brew services 接管
#
# 设计要点：
# - 数据路径 ./data/mongodb：项目本地隔离，与其他项目/系统 mongo 不冲突
# - bindIp 127.0.0.1：loopback 铁律（OpenSpec capability loopback-binding-policy）
# - port 54302：fork 端口段位 54300-54309
# - cacheSizeGB 0.25：限制 WiredTiger 内存占用，本地单用户场景足够
# - fork false：前台运行，由 scripts/local-services.sh 通过 PID 文件管理

storage:
  dbPath: ./data/mongodb
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.25

net:
  bindIp: 127.0.0.1
  port: 54302
  maxIncomingConnections: 100

security:
  authorization: enabled

systemLog:
  destination: file
  path: ./logs/mongod.log
  logAppend: true
  logRotate: reopen
  verbosity: 0

processManagement:
  fork: false

setParameter:
  enableLocalhostAuthBypass: false
