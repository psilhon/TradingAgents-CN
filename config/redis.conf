# Redis 配置文件 — TradingAgents-CN 本地部署模式
# 由 scripts/local-services.sh 加载

# 网络
bind 127.0.0.1
port 54303
protected-mode yes
timeout 0
tcp-keepalive 300

# 认证（与 docker-compose 历史一致）
requirepass tradingagents123

# 持久化
dir ./data/redis
dbfilename dump.rdb
appendonly yes
appendfilename appendonly.aof
appendfsync everysec

# 内存
maxmemory 64mb
maxmemory-policy allkeys-lru

# 日志
logfile ./logs/redis.log
loglevel notice

# 性能
databases 16
hz 10
