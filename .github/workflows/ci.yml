# Generated by init-ci skill (recipe: B-full-dev, stack: python-uv)
# Recipe version: 1.0 (2026-05)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv python install
      # 注意：uv.lock 与 pyproject.toml 不同步（上游已知问题），不能用 --locked。
      # 用 --frozen 跳过 universal resolution，再 pip install -e . 补齐 pyproject 新增依赖。
      - run: uv sync --frozen
      - run: uv pip install -e ".[dev]"

      - uses: extractions/setup-just@v2
        with:
          just-version: 1.36.0

      - run: just ci

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full git history

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
