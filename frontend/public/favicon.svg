<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- 金属琥珀渐变（跟左上 logo-icon 一致）-->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#8a5500"/>
    </linearGradient>
    <!-- 顶端点发光 -->
    <radialGradient id="dot-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 金块背景：圆角矩形 + 内嵌高光环 -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="url(#bg-grad)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" ry="5.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>

  <!-- 网格基线（极淡）-->
  <line x1="4" y1="22" x2="28" y2="22" stroke="#ffffff" stroke-opacity="0.18" stroke-width="0.6" stroke-dasharray="1.5 1.5"/>

  <!-- 上升 K 线趋势 -->
  <polyline points="5,22 9,19 12,21 16,15 19,17 23,11 27,9"
            fill="none" stroke="#ffffff" stroke-opacity="0.95"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 区域填充淡渐变（趋势下方淡白光）-->
  <path d="M5,22 L9,19 L12,21 L16,15 L19,17 L23,11 L27,9 L27,22 Z"
        fill="#ffffff" fill-opacity="0.10"/>

  <!-- 顶端发光点 -->
  <circle cx="27" cy="9" r="3.5" fill="url(#dot-glow)"/>
  <circle cx="27" cy="9" r="1.6" fill="#ffffff"/>
</svg>
